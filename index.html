<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control y Pedidos de Ternos - Almacén</title>
  
  <style>
    /* 1. BLOQUEO DE SELECCIÓN DE TEXTO */
    body, html {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }

    /* Permitir interacción con inputs y botones */
    input, button, .cantidad-control span {
        -webkit-user-select: text !important;
        -moz-user-select: text !important;
        user-select: text !important;
    }

    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f4f7f6; color: #333; line-height: 1.5; }
    h1 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
    .update-info { text-align: center; color: #7f8c8d; font-size: 0.9em; margin-bottom: 25px; font-style: italic; }
    
    .global-asesor { 
        max-width: 500px; 
        margin: 0 auto 30px auto; 
        background: white; 
        padding: 15px; 
        border-radius: 10px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid #e0e0e0;
    }
    .global-asesor input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; outline: none; }
    .global-asesor input:focus { border-color: #3498db; }

    details { margin-bottom: 20px; border: 1px solid #d1d8e0; border-radius: 10px; overflow: hidden; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    summary { padding: 15px; background: #f8f9fa; font-weight: bold; cursor: pointer; color: #2c3e50; border-bottom: 1px solid #eee; }
    summary:hover { background: #edf2f7; }
    
    table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    th { background: #fdfdfd; font-weight: 600; color: #7f8c8d; text-transform: uppercase; font-size: 0.85em; }

    /* 3. COLORES ELEGANTES Y SUAVES (PASTEL) */
    .tela-negro       { background-color: #f9f9f9; } /* Gris casi blanco */
    .tela-azul        { background-color: #ebf4ff; } /* Azul pastel */
    .tela-plomo       { background-color: #f2f2f2; } /* Gris suave */
    .tela-rata        { background-color: #e2e2e2; } /* Gris medio */
    .tela-charcol     { background-color: #eceff1; } /* Azul grisáceo */
    .tela-manchester  { background-color: #f0fff4; } /* Verde menta muy suave */
    .tela-oscuro      { background-color: #f1f3f5; } 
    .tela-rayas       { background-color: #fffaf0; } /* Crema */
    .tela-neovos      { background-color: #f3e5f5; } /* Lavanda suave */
    .tela-marino      { background-color: #e3f2fd; } /* Celeste claro */
    .tela-lino        { background-color: #fef9e7; } /* Amarillito suave */
    .tela-verde       { background-color: #e8f5e9; } /* Verde pálido */
    .tela-barcelona   { background-color: #fff5f2; } /* Salmón muy claro */
    .tela-cobalto     { background-color: #e0f7fa; } /* Cian suave */

    .cantidad-control { display: flex; align-items: center; gap: 8px; justify-content: center; }
    .cantidad-control button { 
        width: 30px; height: 30px; border-radius: 50%; border: none; 
        background: #3498db; color: white; font-weight: bold; cursor: pointer; 
        transition: transform 0.1s, background 0.2s;
    }
    .cantidad-control button:hover { background: #2980b9; transform: scale(1.1); }
    .cantidad-control button:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }
    .cantidad-control span { width: 30px; text-align: center; font-weight: bold; font-size: 1.1em; }
    
    .cantidad-0 { color: #bdc3c7; }
    .cantidad-ok { color: #27ae60; }
    .sin-stock { color: #e74c3c; font-weight: bold; font-size: 0.9em; }
    
    .btn-solicitar { display: block; margin: 15px auto; padding: 10px 25px; background: #2ecc71; color: white; border: none; border-radius: 25px; font-size: 0.9em; cursor: pointer; font-weight: bold; }
    .btn-solicitar:hover { background: #27ae60; }
    
    .btn-copiar-todo { display: block; margin: 40px auto; padding: 18px 40px; background: #34495e; color: white; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .btn-copiar-todo:hover { background: #2c3e50; }
    
    .mensaje-copiado { text-align: center; color: #27ae60; font-weight: bold; margin: 12px 0; opacity: 0; transition: opacity 0.4s; }
    .mensaje-copiado.visible { opacity: 1; }
  </style>

<!-- 2. ACTUALIZACIÓN MANUAL -->

const ordenTallas = ['XS','S','M','L','XL','XXL','3XL','4XL','UNICA'];

// ==================== LÓGICA ====================

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(',').map(v => v.trim());
    if (values.length === 5) {
      data.push({
        tela: values[0], color: values[1], clase: values[2],
        talla: values[3], stock: parseInt(values[4]) || 0
      });
    }
  }
  const grupos = {};
  data.forEach(row => {
    if (!grupos[row.tela]) grupos[row.tela] = {};
    if (!grupos[row.tela][row.color]) grupos[row.tela][row.color] = { clase: row.clase, items: [] };
    grupos[row.tela][row.color].items.push({ talla: row.talla, stock: row.stock });
  });
  return grupos;
}

function generarTodo() {
  const grupos = parseCSV(csvData);
  const container = document.getElementById('contenido');
  // Aplicar fecha manual
  document.getElementById('fecha-update').textContent = `Última actualización: ${FECHA_MANUAL}`;
  
  container.innerHTML = '';

  Object.keys(grupos).forEach(tela => {
    const details = document.createElement('details');
    details.innerHTML = `<summary>${tela}</summary>`;

    Object.keys(grupos[tela]).forEach(color => {
      const info = grupos[tela][color];
      const table = document.createElement('table');
      table.className = info.clase; // Aquí aplica el color de fondo

      let html = '<thead><tr><th>Color</th><th>Talla</th><th>Stock</th><th>Cantidad</th></tr></thead><tbody>';
      info.items.sort((a,b) => ordenTallas.indexOf(a.talla) - ordenTallas.indexOf(b.talla));

      info.items.forEach(item => {
        const stockDisplay = item.stock >= 999 ? '∞' : (item.stock === 0 ? '<span class="sin-stock">Agotado</span>' : item.stock);
        html += `
          <tr data-tela="${tela}" data-color="${color}" data-talla="${item.talla}" data-stock="${item.stock}">
            <td>${color}</td>
            <td><strong>${item.talla}</strong></td>
            <td>${stockDisplay}</td>
            <td>
              <div class="cantidad-control">
                <button onclick="cambiarCantidad(this, -1)" disabled>−</button>
                <span class="cantidad-0">0</span>
                <button onclick="cambiarCantidad(this, +1)" ${item.stock === 0 ? 'disabled' : ''}>+</button>
              </div>
            </td>
          </tr>`;
      });
      html += '</tbody>';
      table.innerHTML = html;
      details.appendChild(table);
    });

    const btn = document.createElement('button');
    btn.className = 'btn-solicitar';
    btn.innerHTML = `Enviar Pedido de ${tela}`;
    btn.onclick = () => solicitarTela(btn);
    details.appendChild(btn);

    const msg = document.createElement('div');
    msg.className = 'mensaje-copiado';
    msg.textContent = '¡Redirigiendo a WhatsApp...!';
    details.appendChild(msg);

    container.appendChild(details);
  });
}

function cambiarCantidad(btn, delta) {
  const control = btn.parentElement;
  const span = control.querySelector('span');
  const row = control.closest('tr');
  const stockMax = parseInt(row.dataset.stock);
  let actual = parseInt(span.textContent);

  actual = Math.max(0, Math.min(stockMax, actual + delta));
  span.textContent = actual;
  span.className = actual > 0 ? 'cantidad-ok' : 'cantidad-0';
  control.querySelector('button:first-child').disabled = (actual <= 0);
  control.querySelector('button:last-child').disabled = (actual >= stockMax);
}

function procesarYEnviar(items, titulo, elementoAviso) {
  const asesor = document.getElementById('nombre-asesor').value.trim() || "No especificado";
  const fecha = FECHA_MANUAL;

  // Ordenar por talla
  items.sort((a,b) => ordenTallas.indexOf(a.talla) - ordenTallas.indexOf(b.talla));

  let texto = `*${titulo}*\n`;
  texto += `👤 *Asesor:* ${asesor}\n`;
  texto += ` *Fecha:* ${fecha}\n`;
  texto += `──────────────────\n`;

  let currentTalla = null;
  items.forEach(item => {
    if (item.talla !== currentTalla) {
      texto += `\n✓ *TALLA ${item.talla}*\n`;
      currentTalla = item.talla;
    }
    texto += `• ${item.tela} (${item.color}) → *${item.cantidad} und.*\n`;
  });
  texto += `\n──────────────────`;

  // Copiar al portapapeles por si falla la redirección
  navigator.clipboard.writeText(texto);

  // Abrir WhatsApp
  const url = `https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent(texto)}`;
  
  elementoAviso.classList.add('visible');
  setTimeout(() => {
      elementoAviso.classList.remove('visible');
      window.open(url, '_blank');
  }, 800);
}

function solicitarTela(btn) {
  const details = btn.closest('details');
  const rows = details.querySelectorAll('tr[data-talla]');
  let items = [];

  rows.forEach(row => {
    const cant = parseInt(row.querySelector('span').textContent);
    if (cant > 0) {
      items.push({ 
        tela: row.dataset.tela, color: row.dataset.color, 
        talla: row.dataset.talla, cantidad: cant 
      });
    }
  });

  if (items.length === 0) return alert("Selecciona cantidades primero.");
  
  procesarYEnviar(items, "PEDIDO DE TERNOS", btn.nextElementSibling);
}

function copiarTodo() {
  const allRows = document.querySelectorAll('tr[data-talla]');
  let items = [];

  allRows.forEach(row => {
    const cant = parseInt(row.querySelector('span').textContent);
    if (cant > 0) {
      items.push({ 
        tela: row.dataset.tela, color: row.dataset.color, 
        talla: row.dataset.talla, cantidad: cant 
      });
    }
  });

  if (items.length === 0) return alert("No has seleccionado ningún producto.");
  
  procesarYEnviar(items, "PEDIDO GENERAL DE TERNOS", document.getElementById('mensaje-global'));
}

window.onload = generarTodo;
</script>
